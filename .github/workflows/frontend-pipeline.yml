name: Deploy Ether Arts to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions obligatoires pour que deploy-pages puisse écrire sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # ─── Job 1 : Validation et préparation de l'artifact ───────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Télécharge le repo sur le runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Étape 2 : Vérifie que les fichiers clés sont bien présents
      - name: Validate frontend files
        run: |
          echo "Validation des fichiers frontend..."

          if [ -f "./frontend/css/main.css" ]; then
            echo "✅ main.css trouvé"
          else
            echo "❌ main.css introuvable !"
            exit 1
          fi

          if [ -f "./frontend/js/main.js" ]; then
            echo "✅ main.js trouvé"
          else
            echo "❌ main.js introuvable !"
            exit 1
          fi

      # Étape 3 : Prépare GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # Étape 4 : Upload uniquement le dossier frontend/
      # → Pages servira depuis frontend/ comme racine
      # → Les chemins relatifs ../css/, ../js/, ../assets/ dans les HTML fonctionneront
      - name: Upload frontend as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

  # ─── Job 2 : Déploiement (séparé, attend que build soit terminé) ────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4