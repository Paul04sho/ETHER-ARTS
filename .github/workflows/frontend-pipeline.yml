name: Optimize Frontend Assets

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build-and-optimize:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository files onto the GitHub runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Minify CSS and JS files to improve web performance
      - name: Minify CSS and JS
        uses: actions/marketplace/actions/minify-css-js-and-html-files-in-github-action@v1.0.0 # Example marketplace tool
        with:
          css_src: '/css/main.css'
          js_src: '/js/main.js'

      # Step 3: Run custom inline JavaScript functionality directly inside the runner
      - name: Execute Custom JS Script
        run: |
          node -e "
          const fs = require('fs');
          console.log('Validating files...');
          if (fs.existsSync('./css/style.css')) {
            console.log('✅ CSS file exists and is validated.');
          } else {
            console.error('❌ CSS file missing!');
            process.exit(1);
          }
          "

      # Step 4: Commit and push the optimized files back to GitHub automatically
      - name: Commit Optimized Assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated CSS/JS optimization"
          git push

      - name: Setup GitHub Pages Static Hosting
        uses: actions/configure-pages@v5

      - name: Upload Finished Web Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the root directory containing your index.html, css, and js

      - name: Deploy Live Site
        uses: actions/deploy-pages@v4
